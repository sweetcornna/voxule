name: PR status labels

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Update PR status labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!issue_number) return;

            async function addLabels(labels) {
              const unique = [...new Set(labels)].filter(Boolean);
              if (!unique.length) return;
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: unique });
            }

            async function removeLabels(labels) {
              for (const name of [...new Set(labels)]) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            function isCodexActor(login) {
              return /codex|chatgpt/i.test(login || '');
            }

            function looksLikeCodexSetupIssue(body) {
              return /To use Codex here|create a Codex account|connect to github|Codex Cloud|code review.*enabled|could not run/i.test(body || '');
            }

            if (context.eventName === 'pull_request_target') {
              const action = context.payload.action;
              if (action === 'closed') {
                await removeLabels(['codex:review-requested', 'codex:needs-review', 'codex:needs-rerun', 'status: 🔁 re-review loop', 'status: 🛠️ actively grinding']);
                if (context.payload.pull_request?.merged) {
                  await addLabels(['status: ✅ merge-ready']);
                }
                return;
              }
              if (action === 'converted_to_draft') {
                await removeLabels(['status: 👀 ready for maintainer look', 'status: ✅ merge-ready']);
                await addLabels(['status: 🛠️ actively grinding']);
                return;
              }
              if (['opened', 'reopened', 'synchronize', 'ready_for_review'].includes(action)) {
                await removeLabels(['codex:reviewed', 'codex:setup-issue', 'status: 👀 ready for maintainer look', 'status: ✅ merge-ready', 'status: 🚧 blocked']);
                await addLabels(['codex:review-requested', action === 'synchronize' ? 'codex:needs-rerun' : 'codex:needs-review', 'status: 🔁 re-review loop']);
                return;
              }
            }

            if (context.eventName === 'issue_comment') {
              const body = context.payload.comment?.body || '';
              const actor = context.payload.comment?.user?.login || '';
              if (/@codex\s+review/i.test(body)) {
                await removeLabels(['codex:reviewed', 'codex:setup-issue', 'status: 👀 ready for maintainer look', 'status: 🚧 blocked']);
                await addLabels(['codex:review-requested', 'status: 🔁 re-review loop']);
                return;
              }
              if (isCodexActor(actor)) {
                await removeLabels(['codex:review-requested', 'codex:needs-review', 'codex:needs-rerun', 'status: 🔁 re-review loop']);
                if (looksLikeCodexSetupIssue(body)) {
                  await removeLabels(['codex:reviewed', 'status: 👀 ready for maintainer look']);
                  await addLabels(['codex:setup-issue', 'status: 🚧 blocked']);
                } else {
                  await removeLabels(['codex:setup-issue', 'status: 🚧 blocked']);
                  await addLabels(['codex:reviewed', 'status: 👀 ready for maintainer look']);
                }
              }
              return;
            }

            if (context.eventName === 'pull_request_review') {
              const actor = context.payload.review?.user?.login || '';
              if (isCodexActor(actor)) {
                await removeLabels(['codex:review-requested', 'codex:needs-review', 'codex:needs-rerun', 'codex:setup-issue', 'status: 🔁 re-review loop', 'status: 🚧 blocked']);
                await addLabels(['codex:reviewed', 'status: 👀 ready for maintainer look']);
              }
            }
